name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-test.txt

      - name: Syntax check
        run: |
          cd backend
          python -m py_compile $(find app -name "*.py" | tr '\n' ' ')
          echo "Syntax OK"

      - name: Run tests
        run: |
          cd backend
          pytest --no-cov -x -q
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: test-secret-key-for-ci-only
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=term-missing -q
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: test-secret-key-for-ci-only
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        continue-on-error: true

  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Check all imports resolve
        run: |
          cd frontend/src
          node --input-type=module << 'EOF'
          import fs from 'fs'
          import path from 'path'
          function walk(dir) {
            const files = []
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name)
              if (e.isDirectory()) files.push(...walk(full))
              else if (e.name.match(/\.(jsx?|tsx?)$/)) files.push(full)
            }
            return files
          }
          const files = walk('.')
          const issues = []
          for (const file of files) {
            const src = fs.readFileSync(file, 'utf8')
            const re = /from ['"]([^'"]+)['"]/g
            let m
            while ((m = re.exec(src)) !== null) {
              const imp = m[1]
              if (!imp.startsWith('.')) continue
              const base = path.dirname(file)
              const exts = ['', '.js', '.jsx', '/index.js', '/index.jsx']
              const found = exts.some(ext => fs.existsSync(path.join(base, imp + ext)))
              if (!found) issues.push(`${file}: '${imp}'`)
            }
          }
          if (issues.length) { issues.forEach(i => console.error('BROKEN:', i)); process.exit(1) }
          else console.log('All imports OK')
          EOF

      - name: Build
        run: cd frontend && npm run build

  lint-backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - name: Flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=__pycache__ \
            --ignore=E501,W503,E203
